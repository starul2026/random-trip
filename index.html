    // --- API 설정 ---
    // ⚠️ 외부 깃허브 사이트에 올리실 때는 아래 따옴표 안에 본인의 Gemini API 키를 넣으셔야 AI 기능이 작동합니다.
    // 무료 발급처: https://aistudio.google.com/app/apikey
    const apiKey = "AIzaSyC_gNiT5wXZy3xU4bYDo0ChSJi5OyVFd0I"; 

    // 재시도 로직이 포함된 Fetch 헬퍼
    const fetchWithRetry = async (url, options, retries = 5) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === retries - 1) throw error;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    };

    function App() {
      const [currentView, setCurrentView] = useState('home'); 
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [activeQuestions, setActiveQuestions] = useState([]);
      const [userTags, setUserTags] = useState([]);
      const [result, setResult] = useState(null);
      
      const [aiInput, setAiInput] = useState('');
      const [aiLoadingMsg, setAiLoadingMsg] = useState('');
      const [apiError, setApiError] = useState('');

      const getInitialDate = (addDays = 0) => {
        const d = new Date();
        d.setDate(d.getDate() + addDays);
        return d.toISOString().split('T')[0];
      };
      const [startDate, setStartDate] = useState(getInitialDate(0));
      const [endDate, setEndDate] = useState(getInitialDate(1));

      const calculateDays = (start, end) => {
        if (!start || !end) return 1;
        const s = new Date(start);
        const e = new Date(end);
        const diffTime = e - s;
        if (diffTime < 0) return 1;
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
      };

      const handleStartDateChange = (e) => {
        setStartDate(e.target.value);
        if (e.target.value > endDate) setEndDate(e.target.value);
      };

      const handleEndDateChange = (e) => {
        setEndDate(e.target.value);
        if (e.target.value < startDate) setStartDate(e.target.value);
      };

      const getRandomQuestions = () => [QUESTION_POOLS.view[0], QUESTION_POOLS.style[0]];

      const startQuiz = () => { setActiveQuestions(getRandomQuestions()); setUserTags([]); setCurrentQIndex(0); setCurrentView('quiz'); };
      
      const startRandom = () => {
        setCurrentView('loading');
        setTimeout(() => { setResult(DOMESTIC_DESTINATIONS[Math.floor(Math.random() * DOMESTIC_DESTINATIONS.length)]); setCurrentView('result'); }, 1500);
      };
      
      const startInternational = () => setCurrentView('international_select');
      
      const handleOptionSelect = (tag) => {
        const newTags = [...userTags, tag];
        if (currentQIndex < activeQuestions.length - 1) { setUserTags(newTags); setCurrentQIndex(currentQIndex + 1); }
        else { calculateDomesticResult(newTags); }
      };

      const calculateDomesticResult = (tags) => {
        setCurrentView('loading');
        setTimeout(() => {
          let bestMatch = DOMESTIC_DESTINATIONS[0];
          let maxScore = -1;
          for (const dest of DOMESTIC_DESTINATIONS) {
            let score = 0;
            dest.tags.forEach(t => { if (tags.includes(t)) score++; });
            if (score > maxScore) { maxScore = score; bestMatch = dest; }
          }
          setResult(bestMatch); setCurrentView('result');
        }, 1500);
      };

      const handleCountrySelect = (country) => { setCurrentView('loading'); setTimeout(() => { setResult(country); setCurrentView('result'); }, 1000); };

      const goHome = () => { setCurrentView('home'); setResult(null); setApiError(''); setAiInput(''); };

      const generateAICourse = async (destinationStr = null) => {
        // API 키 유효성 검사 (깃허브 배포 시 에러 방지)
        if (!apiKey) {
          setApiError('AI 탐험 기능을 사용하려면 코드 상단의 apiKey 부분에 구글 Gemini API 키(무료)를 입력해야 합니다.');
          setCurrentView('ai_loading');
          return;
        }

        setCurrentView('ai_loading');
        setApiError('');
        
        try {
          if (destinationStr) {
            setAiLoadingMsg(`'${destinationStr}' 여행 코스를 짜고 있습니다...`);
          } else {
            setAiLoadingMsg('어느 멋진 곳으로 떠날까요? AI가 목적지를 고르는 중입니다... 🎲');
          }

          const tripDays = calculateDays(startDate, endDate);
          const dateContext = `여행 기간은 ${startDate} 부터 ${endDate} 까지 (총 ${tripDays}일)야. 이 기간에 해당 지역에서 열리는 실제 축제나 행사, 혹은 계절 특색이 있다면 일정에 꼭 반영해서 짜줘.`;
          
          const prompt = destinationStr 
            ? `"${destinationStr}" 지역에 대한 상세한 여행 코스를 짜줘. ${dateContext}` 
            : `세계 어느 곳이든 좋으니 잘 알려지지 않은 멋진 여행지를 랜덤으로 하나 골라서 여행 코스를 짜줘. ${dateContext}`;

          const textPayload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: "너는 최고의 여행 플래너야. 사용자가 설정한 날짜와 기간을 기반으로, 그 기간의 지역 축제나 계절적 특성을 고려해 일정(days 배열)을 짜서 JSON으로 응답해." }] },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  name: { type: "STRING", description: "여행지 이름 (예: 대한민국 속초)" },
                  desc: { type: "STRING", description: "해당 여행지와 기간을 소개하는 감성적인 1~2문장" },
                  days: {
                    type: "ARRAY",
                    items: {
                      type: "OBJECT",
                      properties: {
                        day: { type: "STRING", description: "예: 1일차 (10월 12일)" },
                        festivals: { type: "STRING", description: "이 날짜에 포함된 지역 축제나 특별 행사 요약 (없으면 해당 지역의 이 날짜 추천 팁)" },
                        schedule: {
                          type: "ARRAY",
                          items: {
                            type: "OBJECT",
                            properties: {
                              time: { type: "STRING", description: "시간 (예: 10:00)" },
                              text: { type: "STRING", description: "그 시간의 일정 요약" }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          };

          const textUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const textResponse = await fetchWithRetry(textUrl, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(textPayload)
          });
          
          const aiDataStr = textResponse.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!aiDataStr) throw new Error("AI 텍스트 응답 오류");
          const aiData = JSON.parse(aiDataStr);

          if (destinationStr) {
            setAiLoadingMsg(`'${aiData.name}'의 풍경을 AI가 그리고 있습니다...`);
          } else {
            setAiLoadingMsg(`비밀스러운 미지의 여행지 풍경을 그려내고 있습니다... 과연 어디일까요? 🤫`);
          }
          
          const imgPayload = {
            instances: { prompt: `Beautiful travel photography of ${aiData.name}, scenic, highly detailed, vivid colors, 4k` },
            parameters: { sampleCount: 1 }
          };
          
          const imgUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
          const imgResponse = await fetchWithRetry(imgUrl, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(imgPayload)
          });
          
          const imageBase64 = imgResponse.predictions?.[0]?.bytesBase64Encoded;
          const imageUrl = imageBase64 ? `data:image/png;base64,${imageBase64}` : 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';

          setResult({
            id: 'ai_generated',
            isAi: true,
            name: aiData.name,
            desc: aiData.desc,
            image: imageUrl,
            days: aiData.days 
          });
          
          setCurrentView('result');

        } catch (err) {
          console.error(err);
          setApiError('AI 통신에 실패했습니다. 잠시 후 다시 시도해주세요.');
        }
      };


      const renderContent = () => {
        if (currentView === 'home') {
          const tripDays = calculateDays(startDate, endDate);

          return (
            <div className="max-w-md w-full bg-white/90 backdrop-blur-md rounded-[2.5rem] shadow-2xl shadow-sky-900/10 overflow-hidden p-8 text-center border border-white relative z-10 my-8">
              <div className="w-16 h-16 bg-sky-100 text-sky-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                <i className="fa-solid fa-plane text-3xl transform rotate-12"></i>
              </div>
              <h1 className="text-3xl font-extrabold text-sky-900 mb-2">어디로 떠날까요?</h1>
              <p className="text-sky-600 mb-6 font-medium text-sm">푸른 하늘 너머, 당신의 다음 여행지</p>

              <div className="space-y-5">
                
                <div className="bg-sky-50/70 p-4 rounded-3xl border border-sky-100 shadow-sm text-left relative">
                  <div className="flex items-center text-sky-800 font-bold mb-3">
                    <i className="fa-solid fa-calendar-days text-xl mr-2 text-sky-500"></i>
                    여행 일정 선택
                  </div>
                  <div className="flex space-x-3 mb-2">
                    <div className="flex-1">
                      <label className="block text-[11px] font-bold text-sky-500 mb-1">가는 날</label>
                      <input 
                        type="date" 
                        value={startDate} 
                        onChange={handleStartDateChange} 
                        className="w-full px-3 py-2 rounded-xl border border-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-white text-sm font-medium text-gray-700"
                      />
                    </div>
                    <div className="flex-1">
                      <label className="block text-[11px] font-bold text-sky-500 mb-1">오는 날</label>
                      <input 
                        type="date" 
                        value={endDate} 
                        onChange={handleEndDateChange} 
                        className="w-full px-3 py-2 rounded-xl border border-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-white text-sm font-medium text-gray-700"
                      />
                    </div>
                  </div>
                  <div className="text-right text-xs text-sky-600 font-bold bg-white/60 inline-block float-right px-2 py-1 rounded-md">
                    총 {tripDays}일 일정
                  </div>
                  <div className="clear-both"></div>
                </div>

                <div className="bg-gradient-to-r from-purple-50 to-pink-50 p-5 rounded-3xl space-y-3 border border-purple-100 shadow-sm relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-2 opacity-20"><i className="fa-solid fa-wand-magic-sparkles text-[4rem] text-purple-500"></i></div>
                  
                  <div className="flex items-center justify-center space-x-2 text-purple-600 mb-2">
                    <i className="fa-solid fa-wand-magic-sparkles text-base"></i>
                    <span className="text-sm font-bold tracking-wider">AI 무제한 탐험 (축제 자동매칭)</span>
                  </div>
                  
                  <div className="flex space-x-2">
                    <input 
                      type="text" 
                      value={aiInput}
                      onChange={(e) => setAiInput(e.target.value)}
                      placeholder="예: 강원도 속초, 로마..."
                      className="flex-1 px-4 py-3 rounded-xl border border-purple-200 focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white/80 text-sm font-medium z-10"
                    />
                    <button 
                      onClick={() => { if(aiInput.trim()) generateAICourse(aiInput); }}
                      className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-3 rounded-xl transition-all shadow-md z-10"
                    >
                      <i className="fa-solid fa-magnifying-glass text-xl"></i>
                    </button>
                  </div>

                  <button 
                    onClick={() => generateAICourse(null)}
                    className="w-full flex items-center justify-center bg-white hover:bg-purple-100 text-purple-700 py-3 rounded-xl transition-all border border-purple-200 font-bold shadow-sm z-10 relative"
                  >
                    <i className="fa-solid fa-rotate-right text-base mr-2"></i>
                    지구상 아무데나 AI 랜덤 추천
                  </button>
                </div>

                <div className="border-t border-sky-100 border-dashed"></div>

                <div className="space-y-3">
                  <span className="text-[11px] font-bold text-sky-500 tracking-wider">초고속 기본 추천 (저장된 1일 코스)</span>
                  <div className="flex space-x-2">
                    <button onClick={startQuiz} className="flex-1 bg-sky-500 hover:bg-sky-600 text-white py-3 rounded-xl font-bold shadow-md transition-all text-xs">
                      국내 취향
                    </button>
                    <button onClick={startRandom} className="flex-1 bg-white hover:bg-sky-50 text-sky-600 py-3 rounded-xl font-bold border border-sky-100 shadow-sm transition-all text-xs">
                      국내 랜덤
                    </button>
                    <button onClick={startInternational} className="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-3 rounded-xl font-bold border border-indigo-100 shadow-sm transition-all text-xs">
                      해외 선택
                    </button>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        if (currentView === 'quiz' && activeQuestions.length > 0) {
          const question = activeQuestions[currentQIndex];
          const progress = ((currentQIndex) / activeQuestions.length) * 100;

          return (
            <div className="max-w-md w-full bg-white/90 backdrop-blur-md rounded-[2.5rem] shadow-2xl shadow-sky-900/10 p-8 border border-white relative z-10">
              <div className="w-full bg-sky-100 rounded-full h-3 mb-8 shadow-inner overflow-hidden">
                <div className="bg-sky-400 h-full rounded-full transition-all duration-500 relative" style={{ width: `${progress}%` }}>
                  <div className="absolute top-0 right-0 bottom-0 left-0 bg-white/20 animate-pulse"></div>
                </div>
              </div>
              <div className="text-center mb-8">
                <span className="text-sm font-bold text-sky-500 tracking-wider bg-sky-50 px-3 py-1 rounded-full">QUESTION {currentQIndex + 1}</span>
                <h2 className="text-2xl font-bold text-sky-900 mt-4 break-keep leading-tight">{question.question}</h2>
              </div>
              <div className="space-y-4">
                {question.options.map((opt, idx) => (
                  <button key={idx} onClick={() => handleOptionSelect(opt.tag)} className="w-full flex flex-col items-center justify-center p-6 bg-white hover:bg-sky-50 border-2 border-sky-50 hover:border-sky-300 rounded-2xl transition-all shadow-sm hover:shadow-md group">
                    <div className="text-sky-300 group-hover:text-sky-500 transition-colors group-hover:scale-110 transform duration-300">{opt.icon}</div>
                    <span className="font-bold text-sky-800 group-hover:text-sky-600">{opt.text}</span>
                  </button>
                ))}
              </div>
              <button onClick={goHome} className="mt-8 w-full text-sky-400 hover:text-sky-600 text-sm font-medium underline underline-offset-4 transition-colors">처음으로 돌아가기</button>
            </div>
          );
        }

        if (currentView === 'international_select') {
          return (
            <div className="max-w-md w-full bg-white/90 backdrop-blur-md rounded-[2.5rem] shadow-2xl shadow-sky-900/10 p-6 border border-white relative z-10">
              <div className="text-center mb-6">
                <div className="w-16 h-16 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-4">
                  <i className="fa-solid fa-globe text-3xl"></i>
                </div>
                <h2 className="text-2xl font-extrabold text-indigo-900 mb-2">어느 나라로 갈까요?</h2>
              </div>
              <div className="grid grid-cols-2 gap-3 mb-6">
                {INTERNATIONAL_DESTINATIONS.map((country) => (
                  <button key={country.id} onClick={() => handleCountrySelect(country)} className="flex flex-col items-center justify-center p-4 bg-white border border-indigo-50 rounded-2xl shadow-sm hover:shadow-md hover:border-indigo-200 hover:bg-indigo-50 transition-all group">
                    <span className="text-3xl mb-2 group-hover:scale-110 transition-transform">{country.emoji}</span>
                    <span className="font-bold text-gray-700 group-hover:text-indigo-700 text-sm">{country.name.split(' ')[0]}</span>
                  </button>
                ))}
              </div>
              <button onClick={goHome} className="w-full text-gray-400 hover:text-gray-600 text-sm font-medium underline underline-offset-4 transition-colors">이전 화면으로 돌아가기</button>
            </div>
          );
        }

        if (currentView === 'loading' || currentView === 'ai_loading') {
          const isAi = currentView === 'ai_loading';
          return (
            <div className="text-center relative z-10 bg-white/70 backdrop-blur-md p-10 rounded-[3rem] shadow-xl border border-white/50 max-w-sm w-full">
              <div className="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center">
                {isAi ? <i className="fa-solid fa-wand-magic-sparkles absolute text-[5rem] text-purple-300 animate-pulse"></i> : <i className="fa-solid fa-cloud absolute text-[6rem] text-sky-200 animate-pulse"></i>}
                <i className={`fa-solid fa-plane absolute text-4xl m-auto animate-bounce transform rotate-12 ${isAi ? 'text-purple-600' : 'text-sky-600'}`}></i>
              </div>
              <h2 className={`text-2xl font-extrabold mb-2 ${isAi ? 'text-purple-900' : 'text-sky-900'}`}>
                {isAi ? 'AI 여행 플래너 작동 중...' : '하늘을 날아 탐색 중...'}
              </h2>
              <p className="text-gray-600 font-medium h-auto min-h-[1.5rem]">
                {isAi ? aiLoadingMsg : '여행 코스를 불러오고 있어요!'}
              </p>

              {apiError && (
                <div className="mt-6 bg-red-50 p-4 rounded-xl flex flex-col items-center justify-center text-red-600 text-sm font-bold">
                  <div className="flex items-center mb-2">
                    <i className="fa-solid fa-circle-exclamation text-xl mr-2"></i> 오류 발생
                  </div>
                  <span className="text-center mb-2 font-normal text-gray-700">{apiError}</span>
                  <button onClick={goHome} className="underline text-red-500 hover:text-red-700">홈으로 돌아가기</button>
                </div>
              )}
            </div>
          );
        }

        if (currentView === 'result' && result) {
          const isDomestic = DOMESTIC_DESTINATIONS.some(d => d.id === result.id);
          const isAi = result.isAi;
          const themeColor = isAi ? 'purple' : (isDomestic ? 'sky' : 'indigo');
          
          // Tailwind CDN 동적 클래스 파싱을 위한 하드코딩된 스타일 객체 매핑
          const themeStyles = {
            purple: {
              bg: 'bg-purple-500/90', shadow: 'shadow-purple-900/10', text: 'text-purple-800', bgLight: 'bg-purple-50',
              title: 'text-purple-900', icon: 'text-purple-500', dot: 'bg-purple-400', line: 'bg-purple-100',
              timeText: 'text-purple-600'
            },
            sky: {
              bg: 'bg-sky-500/90', shadow: 'shadow-sky-900/10', text: 'text-sky-800', bgLight: 'bg-sky-50',
              title: 'text-sky-900', icon: 'text-sky-500', dot: 'bg-sky-400', line: 'bg-sky-100',
              timeText: 'text-sky-600'
            },
            indigo: {
              bg: 'bg-indigo-500/90', shadow: 'shadow-indigo-900/10', text: 'text-indigo-800', bgLight: 'bg-indigo-50',
              title: 'text-indigo-900', icon: 'text-indigo-500', dot: 'bg-indigo-400', line: 'bg-indigo-100',
              timeText: 'text-indigo-600'
            }
          };
          const theme = themeStyles[themeColor];
          
          const daysData = result.days || [{
            day: '1일차 (기본 코스)',
            festivals: null,
            schedule: result.course
          }];
          
          return (
            <div className={`max-w-md w-full bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl ${theme.shadow} overflow-hidden relative z-10 border border-white my-8`}>
              
              <div className="h-72 w-full relative shrink-0">
                <img src={result.image} alt={result.name} className="w-full h-full object-cover" />
                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>
                <div className="absolute bottom-0 left-0 p-6 text-white w-full">
                  <span className={`text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider mb-3 inline-block shadow-sm ${theme.bg} flex items-center w-max`}>
                    {isAi && <i className="fa-solid fa-wand-magic-sparkles text-sm mr-1"></i>}
                    {isAi ? `AI 생성 맞춤 코스 (${calculateDays(startDate, endDate)}일)` : (isDomestic ? '국내 추천 목적지' : '해외 추천 목적지')}
                  </span>
                  <h2 className="text-3xl font-extrabold drop-shadow-md">{result.name}</h2>
                </div>
              </div>

              <div className="p-6">
                <p className={`text-lg font-medium leading-relaxed mb-6 p-4 rounded-2xl ${theme.text} ${theme.bgLight}`}>
                  "{result.desc}"
                </p>

                <div className="space-y-4 mb-8">
                  {daysData.map((dayObj, dIdx) => (
                    <div key={dIdx} className="bg-white border border-gray-100 shadow-sm rounded-2xl p-5">
                      <h3 className={`font-extrabold mb-4 flex items-center text-lg ${theme.title} border-b border-gray-100 pb-3`}>
                        <i className={`fa-solid fa-calendar-days text-xl mr-2 ${theme.icon}`}></i>
                        {dayObj.day}
                      </h3>
                      
                      {dayObj.festivals && (
                        <div className="bg-amber-50 text-amber-700 text-[13px] font-bold px-3 py-2.5 rounded-xl mb-5 flex items-start border border-amber-100/50">
                          <i className="fa-solid fa-wand-magic-sparkles text-base mr-1.5 mt-0.5 flex-shrink-0 text-amber-500"></i>
                          <span className="leading-snug">{dayObj.festivals}</span>
                        </div>
                      )}

                      <div className="space-y-5">
                        {dayObj.schedule.map((item, idx) => (
                          <div key={idx} className="flex group">
                            <div className="flex flex-col items-center mr-4">
                              <div className={`w-3 h-3 rounded-full mt-1.5 group-hover:scale-125 transition-transform shadow-sm ${theme.dot}`}></div>
                              {idx !== dayObj.schedule.length - 1 && (<div className={`w-0.5 h-full my-1 ${theme.line}`}></div>)}
                            </div>
                            <div>
                              <span className={`text-sm font-bold px-2 py-0.5 rounded-md inline-block mb-1 ${theme.timeText} ${theme.bgLight}`}>
                                {item.time}
                              </span>
                              <p className="text-gray-800 font-medium">{item.text}</p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="flex space-x-3">
                  <button onClick={goHome} className="flex-1 bg-gray-50 hover:bg-gray-100 text-gray-700 py-3.5 rounded-xl font-bold transition-colors border border-gray-200">
                    홈으로
                  </button>
                  
                  {isAi ? (
                    <button onClick={() => generateAICourse(null)} className="flex-[2] bg-purple-600 hover:bg-purple-700 text-white py-3.5 rounded-xl font-bold flex items-center justify-center transition-all shadow-lg shadow-purple-200">
                      <i className="fa-solid fa-wand-magic-sparkles text-xl mr-2"></i> 다른 곳 AI 추천
                    </button>
                  ) : isDomestic ? (
                    <button onClick={startRandom} className="flex-[2] bg-sky-500 hover:bg-sky-600 text-white py-3.5 rounded-xl font-bold flex items-center justify-center transition-all shadow-lg shadow-sky-200">
                      <i className="fa-solid fa-rotate-right text-xl mr-2"></i> 국내 랜덤 추천
                    </button>
                  ) : (
                    <button onClick={startInternational} className="flex-[2] bg-indigo-500 hover:bg-indigo-600 text-white py-3.5 rounded-xl font-bold flex items-center justify-center transition-all shadow-lg shadow-indigo-200">
                      <i className="fa-solid fa-globe text-xl mr-2"></i> 다른 나라 선택
                    </button>
                  )}
                </div>
              </div>
            </div>
          );
        }

        return null;
      };

      return (
        <div className="min-h-screen bg-gradient-to-b from-sky-300 via-sky-100 to-white flex flex-col items-center justify-center p-4 relative overflow-x-hidden selection:bg-sky-200 font-sans">
          <i className="fa-solid fa-cloud absolute top-10 -left-10 text-[12rem] text-white/40"></i>
          <i className="fa-solid fa-cloud absolute top-32 -right-16 text-[16rem] text-white/30"></i>
          <i className="fa-solid fa-cloud absolute bottom-20 left-10 text-[8rem] text-sky-200/30"></i>
          <i className="fa-solid fa-cloud absolute bottom-10 -right-5 text-[10rem] text-sky-100/50"></i>
          {renderContent()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
